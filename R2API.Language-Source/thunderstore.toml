
[config]
schemaVersion = "0.0.1"

[package]
namespace = "Jaosnake"
name = "PELE"
versionNumber = "1.0.1"
description = "P.E.L.E adds native Ukrainian, Esperanto, and Latin support, JSON packs, hot reload, and full R2API.Language compatibility."
websiteUrl = "https://github.com/Jaosnake/ror2-multi-language-pack"
containsNsfwContent = false

[package.dependencies]
bbepis-BepInExPack = "5.4.2121"
RiskofThunder-HookGenPatcher = "1.2.9"
RiskofThunder-R2API_Core = "5.3.0"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
# Keep this path compatible with RiskofThunder-R2API_Language. P.E.L.E replaces
# R2API.Language.dll; it must not be installed side-by-side as another DLL with
# the same BepInEx GUID.
source = "./ReleaseOutput"
target = "./plugins/RiskofThunder-R2API_Language/R2API.Language"

[[build.copy]]
source = "../PELE"
target = "./plugins/PELE"

[publish]
repository = "https://thunderstore.io"
communities = ["riskofrain2"]
categories = ["libraries"]
